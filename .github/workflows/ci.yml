name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    # Temporarily disabled by default to reduce CI spend.
    # Re-enable by creating a repository variable: ENABLE_BACKEND_CI_TESTS=true
    if: ${{ vars.ENABLE_BACKEND_CI_TESTS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build
